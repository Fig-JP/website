<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ランダム選択 | Fig's ToolBox</title>
    <link rel="stylesheet" href="css/common.css">
    <style>
        /* choose.html 専用スタイル */
        main {
            padding: 100px 20px 40px;
            max-width: 600px;
            margin: 0 auto;
        }

        .section-label {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 10px;
            display: block;
        }

        .options-textarea {
            width: 100%;
            min-height: 120px;
            background: var(--settings-bg);
            border: 2px solid var(--card-border);
            border-radius: 8px;
            padding: 15px;
            color: var(--text-primary);
            font-size: 1rem;
            line-height: 1.6;
            resize: vertical;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .options-textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .options-textarea::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }

        .input-hint {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-top: 8px;
        }

        .count-input {
            width: 80px;
            background: var(--card-bg);
            border: 2px solid var(--card-border);
            border-radius: 8px;
            padding: 10px;
            color: var(--accent);
            font-size: 1.2rem;
            text-align: center;
            font-weight: bold;
        }

        .count-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .result-section {
            background: var(--settings-bg);
            border: 2px solid var(--card-border);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            min-height: 100px;
        }

        .result-placeholder {
            color: var(--text-muted);
            text-align: center;
            padding: 20px 0;
            opacity: 0.7;
        }

        .result-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .result-item {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 15px 20px;
            font-size: 1.1rem;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .result-number {
            background: var(--accent);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .history-query {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-bottom: 5px;
        }

        .history-result {
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        .empty-history {
            color: var(--text-muted);
            text-align: center;
            padding: 20px;
            font-style: italic;
        }

        .toast.error {
            background: #ef4444;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }
        }

        input[type=number]::-webkit-inner-spin-button {
            -webkit-appearance: none;
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">🛠️ Fig's ToolBox</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <div class="container">
            <h1>🎯 ランダム選択</h1>
            <p class="subtitle">入力した選択肢からランダムに選びます</p>

            <div style="margin-bottom: 25px;">
                <label class="section-label">選択肢（1行に1つ）</label>
                <textarea 
                    class="options-textarea" 
                    id="optionsInput" 
                    placeholder="選択肢を入力してください&#10;例：&#10;カレー&#10;ラーメン&#10;ハンバーグ&#10;寿司"
                ></textarea>
                <p class="input-hint">入力した選択肢の数: <span id="optionCount">0</span>個</p>
            </div>

            <div class="settings">
                <div class="setting-row">
                    <span class="setting-label">選ぶ個数</span>
                    <input 
                        type="number" 
                        class="count-input" 
                        id="selectCount" 
                        value="1" 
                        min="1" 
                        max="100"
                    >
                </div>
                <div class="setting-row">
                    <span class="setting-label">同じ選択肢を複数回選ぶ（重複許可）</span>
                    <label class="toggle">
                        <input type="checkbox" id="allowDuplicate">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>

            <button class="btn btn-primary" onclick="selectRandom()">🎲 ランダムに選ぶ</button>

            <div class="result-section" id="resultSection">
                <div class="result-placeholder">選択肢を入力して「ランダムに選ぶ」を押してください</div>
            </div>

            <div class="history-section">
                <div class="history-header">
                    <span class="history-title">📜 履歴</span>
                    <button class="clear-btn" onclick="clearHistory()">クリア</button>
                </div>
                <div class="history-list" id="historyList">
                    <div class="empty-history">まだ履歴がありません</div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>Created by Fig | <a href="about.html">About Me</a></p>
    </footer>

    <div class="toast" id="toast"></div>

    <script>
        let history = [];

        document.getElementById('optionsInput').addEventListener('input', function() {
            const lines = this.value.split('\n').filter(line => line.trim() !== '');
            document.getElementById('optionCount').textContent = lines.length;
        });

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function selectRandom() {
            const input = document.getElementById('optionsInput').value.trim();
            const selectCount = parseInt(document.getElementById('selectCount').value) || 1;
            const allowDuplicate = document.getElementById('allowDuplicate').checked;

            const options = input.split('\n').filter(line => line.trim() !== '');
            
            if (options.length === 0) {
                showToast("⚠️ 選択肢を入力してください", true);
                return;
            }

            if (!allowDuplicate && selectCount > options.length) {
                showToast(`⚠️ 重複なしで${selectCount}個選ぶには、${selectCount}個以上の選択肢が必要です`, true);
                return;
            }

            let selected = [];
            let available = [...options];

            for (let i = 0; i < selectCount; i++) {
                if (!allowDuplicate && available.length === 0) break;
                
                const pool = allowDuplicate ? options : available;
                const idx = Math.floor(Math.random() * pool.length);
                selected.push(pool[idx]);

                if (!allowDuplicate) {
                    available.splice(idx, 1);
                }
            }

            displayResult(selected);
            addToHistory(selectCount, selected, allowDuplicate);
        }

        function displayResult(selected) {
            const section = document.getElementById('resultSection');
            
            if (selected.length === 1) {
                section.innerHTML = `<div class="result-list"><div class="result-item"><span style="font-size:1.3rem">${selected[0]}</span></div></div>`;
            } else {
                section.innerHTML = `<div class="result-list">` + 
                    selected.map((item, i) => 
                        `<div class="result-item"><div class="result-number">${i + 1}</div><span>${item}</span></div>`
                    ).join('') + `</div>`;
            }
        }

        function addToHistory(count, selected, allowDuplicate) {
            history.unshift({ count, selected, allowDuplicate });
            if (history.length > 10) history.pop();
            updateHistoryDisplay();
        }

        function updateHistoryDisplay() {
            const container = document.getElementById('historyList');
            
            if (history.length === 0) {
                container.innerHTML = '<div class="empty-history">まだ履歴がありません</div>';
                return;
            }

            container.innerHTML = history.map(entry => `
                <div class="history-item">
                    <div class="history-query">${entry.count}個選択 ${entry.allowDuplicate ? '(重複あり)' : ''}</div>
                    <div class="history-result">${entry.selected.join('、')}</div>
                </div>
            `).join('');
        }

        function clearHistory() {
            history = [];
            updateHistoryDisplay();
            showToast("履歴をクリアしました");
        }
    </script>
</body>
</html>
