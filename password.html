<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パスワード生成器 | Fig's ToolBox</title>
    <link rel="stylesheet" href="css/common.css">
    <style>
        /* password.html 専用スタイル */
        .result {
            color: var(--accent);
        }

        .strength-weak  { background: #ef4444; }
        .strength-fair  { background: #f59e0b; }
        .strength-good  { background: #3b82f6; }
        .strength-strong{ background: #10b981; }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-end) 100%);
            color: white;
        }

        .tips {
            background: var(--settings-bg);
            border-left: 4px solid var(--accent);
            padding: 15px 20px;
            margin-top: 20px;
            border-radius: 0 8px 8px 0;
        }

        .tips-title {
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 8px;
        }

        .tips-list {
            color: var(--text-muted);
            padding-left: 24px;
            margin-top: 8px;
            line-height: 1.8;
        }

        .history-pwd {
            color: var(--accent);
            font-family: monospace;
        }

        .btn-copy {
            background: var(--btn-secondary-bg);
            color: var(--btn-secondary-color);
            border: none;
            border-radius: 6px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .btn-copy:hover {
            background: var(--btn-secondary-hover);
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">🛠️ Fig's ToolBox</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
            </ul>
        </div>
    </nav>
    
    <div class="container">
        <h1>🔐 パスワード生成器</h1>
        <p class="subtitle">安全で強力なパスワードを瞬間生成</p>
        
        <div class="result-box">
            <div class="result" id="result">
                <span class="result-placeholder">「生成」ボタンを押してください</span>
            </div>
            <div class="strength-bar">
                <div class="strength-fill" id="strength-fill"></div>
            </div>
            <div class="strength-text" id="strength-text">強度: -</div>
        </div>
        
        <div class="settings">
            <div class="setting-row">
                <span class="setting-label">文字数</span>
                <div class="length-control">
                    <input type="range" id="length" min="8" max="32" value="16" oninput="updateLength(this.value)">
                    <span class="length-value" id="length-val">16</span>
                </div>
            </div>
            
            <div class="setting-row">
                <span class="setting-label">大文字 (A-Z)</span>
                <label class="toggle">
                    <input type="checkbox" id="upper" checked>
                    <span class="toggle-slider"></span>
                </label>
            </div>
            
            <div class="setting-row">
                <span class="setting-label">小文字 (a-z)</span>
                <label class="toggle">
                    <input type="checkbox" id="lower" checked>
                    <span class="toggle-slider"></span>
                </label>
            </div>
            
            <div class="setting-row">
                <span class="setting-label">数字 (0-9)</span>
                <label class="toggle">
                    <input type="checkbox" id="numbers" checked>
                    <span class="toggle-slider"></span>
                </label>
            </div>
            
            <div class="setting-row">
                <span class="setting-label">記号 (!@#$...)</span>
                <label class="toggle">
                    <input type="checkbox" id="symbols" checked>
                    <span class="toggle-slider"></span>
                </label>
            </div>
            
            <div class="setting-row">
                <span class="setting-label">紛らわしい文字を除外<br><small style="opacity:0.6">(0, O, l, 1, I)</small></span>
                <label class="toggle">
                    <input type="checkbox" id="exclude-ambiguous" checked>
                    <span class="toggle-slider"></span>
                </label>
            </div>
        </div>
        
        <button class="btn btn-primary" onclick="generate()">⚡ パスワードを生成</button>
        <button class="btn btn-secondary" id="copy-btn" onclick="copyResult()" disabled>📋 コピー</button>
        
        <div class="history-section" id="history-section" style="display:none;">
            <div class="history-header">
                <span class="history-title">生成履歴</span>
                <button class="clear-btn" onclick="clearHistory()">クリア</button>
            </div>
            <div class="history-list" id="history-list"></div>
        </div>
        
        <div class="tips">
            <div class="tips-title">💡 セキュリティのヒント</div>
            <ul class="tips-list">
                <li>12文字以上かつ4種類の文字を混ぜると最強</li>
                <li>同じパスワードを複数サイトで使い回さない</li>
                <li>パスワードマネージャーの利用を推奨</li>
            </ul>
        </div>
    </div>
    
    <footer>
        <p>Created by Fig | <a href="about.html">About Me</a></p>
    </footer>
    
    <div class="toast" id="toast">コピーしました！</div>

    <script>
        const charSets = {
            upper: "ABCDEFGHIJKLMNOPQRSTUVWXYZ",
            lower: "abcdefghijklmnopqrstuvwxyz",
            numbers: "0123456789",
            symbols: "!@#$%^*()_+-=[]{}|;:,.?"
        };
        
        const ambiguous = "0O1lI";
        let history = [];
        let currentPassword = "";
        
        function updateLength(val) {
            document.getElementById('length-val').textContent = val;
        }
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
        
        function calculateStrength(password) {
            let score = 0;
            if (password.length >= 8) score += 0.5;
            if (password.length >= 12) score += 1;
            if (password.length >= 16) score += 1;
            if (password.length >= 20) score += 1;
            if (password.length >= 24) score += 0.5;
            
            const hasUpper = /[A-Z]/.test(password);
            const hasLower = /[a-z]/.test(password);
            const hasNumber = /[0-9]/.test(password);
            const hasSymbol = /[^A-Za-z0-9]/.test(password);
            
            const typeCount = [hasUpper, hasLower, hasNumber, hasSymbol].filter(Boolean).length;
            
            if (typeCount === 4) score += 2;
            else if (typeCount === 3) score += 1;
            else if (typeCount === 2) score += 0.5;
            else score -= 1;
            
            if (password.length < 12 && typeCount < 3) score -= 1;
            if (/(.)\1{2,}/.test(password)) score -= 0.5;
            
            return Math.max(0, Math.min(3, Math.floor(score)));
        }
        
        function getStrengthLabel(level) {
            const labels = ["弱い", "普通", "良好", "強力"];
            const classes = ["strength-weak", "strength-fair", "strength-good", "strength-strong"];
            return { text: labels[level], className: classes[level], width: (level + 1) * 25 };
        }
        
        function generate() {
            const length = parseInt(document.getElementById('length').value);
            const useUpper = document.getElementById('upper').checked;
            const useLower = document.getElementById('lower').checked;
            const useNumbers = document.getElementById('numbers').checked;
            const useSymbols = document.getElementById('symbols').checked;
            const excludeAmbiguous = document.getElementById('exclude-ambiguous').checked;
            
            let chars = "";
            if (useUpper) chars += charSets.upper;
            if (useLower) chars += charSets.lower;
            if (useNumbers) chars += charSets.numbers;
            if (useSymbols) chars += charSets.symbols;
            
            if (chars === "") {
                showToast("⚠️ 少なくとも1種類を選択してください");
                return;
            }
            
            if (excludeAmbiguous) {
                for (let char of ambiguous) {
                    chars = chars.split(char).join('');
                }
            }
            
            let password = "";
            const required = [];
            if (useUpper) required.push(getRandomChar(charSets.upper, excludeAmbiguous));
            if (useLower) required.push(getRandomChar(charSets.lower, excludeAmbiguous));
            if (useNumbers) required.push(getRandomChar(charSets.numbers, excludeAmbiguous));
            if (useSymbols) required.push(getRandomChar(charSets.symbols, excludeAmbiguous));
            
            password = required.join('');
            
            while (password.length < length) {
                password += chars[Math.floor(Math.random() * chars.length)];
            }
            
            password = password.split('').sort(() => Math.random() - 0.5).join('');
            
            currentPassword = password;
            document.getElementById('result').textContent = password;
            document.getElementById('copy-btn').disabled = false;
            
            const strength = calculateStrength(password);
            const { text, className, width } = getStrengthLabel(strength);
            const fill = document.getElementById('strength-fill');
            fill.className = 'strength-fill ' + className;
            fill.style.width = width + '%';
            document.getElementById('strength-text').textContent = `強度: ${text} (${password.length}文字)`;
            
            addToHistory(password);
        }
        
        function getRandomChar(set, excludeAmbiguous) {
            let valid = set;
            if (excludeAmbiguous) {
                for (let char of ambiguous) {
                    valid = valid.split(char).join('');
                }
            }
            return valid[Math.floor(Math.random() * valid.length)];
        }
        
        function addToHistory(pwd) {
            history = history.filter(p => p !== pwd);
            history.unshift(pwd);
            if (history.length > 5) history = history.slice(0, 5);
            updateHistoryDisplay();
        }
        
        function updateHistoryDisplay() {
            const section = document.getElementById('history-section');
            const container = document.getElementById('history-list');
            
            if (history.length === 0) {
                section.style.display = 'none';
                return;
            }
            
            section.style.display = 'block';
            container.innerHTML = history.map(pwd => `
                <div class="history-item">
                    <span class="history-pwd">${pwd}</span>
                    <button class="btn-copy" onclick="copyText('${pwd}')">コピー</button>
                </div>
            `).join('');
        }
        
        function clearHistory() {
            history = [];
            updateHistoryDisplay();
            showToast("履歴をクリアしました");
        }
        
        function copyResult() {
            if (currentPassword) copyText(currentPassword);
        }
        
        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast("コピーしました！");
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast("コピーしました！");
            });
        }
    </script>
</body>
</html>
