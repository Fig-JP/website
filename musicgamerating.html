<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音ゲーレート計算 | Fig's ToolBox</title>
    <link rel="stylesheet" href="css/common.css">
    <style>
        /* ===== ゲーム選択タブ ===== */
        .game-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .game-tab {
            flex: 1;
            min-width: 90px;
            padding: 10px 8px;
            border: 2px solid var(--card-border);
            border-radius: 10px;
            background: var(--settings-bg);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
            transition: all 0.2s;
        }

        .game-tab:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .game-tab.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .game-tab .game-icon {
            display: block;
            font-size: 1.4rem;
            margin-bottom: 4px;
        }

        /* ===== フォームパネル ===== */
        .game-panel {
            display: none;
        }

        .game-panel.active {
            display: block;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-label {
            display: block;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
            font-weight: 500;
        }

        .input-label .hint {
            font-size: 0.78rem;
            opacity: 0.65;
            font-weight: 400;
            margin-left: 6px;
        }

        .score-input {
            width: 100%;
            padding: 14px 16px;
            font-size: 1.2rem;
            font-weight: 600;
            border: 2px solid var(--card-border);
            border-radius: 10px;
            background: var(--settings-bg);
            color: var(--text-primary);
            transition: border-color 0.2s;
            font-family: "SF Mono", Monaco, monospace;
        }

        .score-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .score-input::placeholder {
            color: var(--text-muted);
            opacity: 0.5;
            font-weight: 400;
        }

        /* ===== レート表示 ===== */
        .rate-display {
            background: var(--settings-bg);
            border: 2px solid var(--card-border);
            border-radius: 16px;
            padding: 28px;
            text-align: center;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }

        .rate-display.has-result {
            border-color: var(--accent);
        }

        .rate-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }

        .rate-value {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--accent);
            font-family: "SF Mono", Monaco, monospace;
            line-height: 1;
            margin-bottom: 8px;
        }

        .rate-value.empty {
            color: var(--text-muted);
            opacity: 0.3;
            font-size: 2.5rem;
        }

        .rank-badge {
            display: inline-block;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 700;
            margin-top: 6px;
        }

        /* ===== ベスト枠セクション ===== */
        .best-section {
            margin-top: 30px;
            padding-top: 24px;
            border-top: 2px solid var(--border-color);
        }

        .best-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .best-title {
            font-weight: 700;
            font-size: 1rem;
            color: var(--text-primary);
        }

        .best-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;

        .small-btn-primary {

            opacity: 0.85;
        }

        .small-btn-secondary {
            background: var(--btn-secondary-bg);
            color: var(--btn-secondary-color);
        }

        .small-btn-secondary:hover {
            background: var(--btn-secondary-hover);
        }

        .small-btn-danger {

            color: #ef4444;
        }

        .small-btn-danger:hover {
            background: rgba(239, 68, 68, 0.25);
        }

        /* ===== ベスト枠リスト ===== */
        .best-avg-bar {

        .best-list {

            display: flex;
            align-items: center;

        .best-rank {
            font-weight: 700;

            font-family: monospace;

            color: var(--text-primary);

        .best-constant {

        .best-rate {

            font-family: "SF Mono", Monaco, monospace;

            opacity: 0.4;

            color: #ef4444;

        .empty-best {

    <script>
    // =============================================
    //  ゲーム切替
    // =============================================
    let currentGame = 'arcaea';

    function switchGame(game) {
        document.querySelectorAll('.game-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.game-panel').forEach(p => p.classList.remove('active'));
        document.getElementById('tab-' + game).classList.add('active');
        document.getElementById('panel-' + game).classList.add('active');
        currentGame = game;
    }

    // =============================================
    //  レート計算ロジック（Pythonから移植）
    // =============================================

    // --- Arcaea ---
    function calcArcaea() {
        const c = parseFloat(document.getElementById('arc-constant').value);
        const s = parseInt(document.getElementById('arc-score').value);
        const display = document.getElementById('arc-display');
        const rateEl = document.getElementById('arc-rate');
        const rankEl = document.getElementById('arc-rank');

        if (isNaN(c) || isNaN(s)) {
            rateEl.textContent = '--.-—';
            rateEl.className = 'rate-value empty';
            rankEl.innerHTML = '';
            display.classList.remove('has-result');
            return;
        }

        if (s > 10005000) {
            showToast('⚠️ スコアが理論値(10,005,000)を超えています', true);
            return;
        }

        let rate;
        if (s >= 10000000) {
            rate = c + 2.0;
        } else if (s >= 9800000) {
            rate = c + 1.0 + (s - 9800000) / 200000;
        } else {
            rate = c + (s - 9500000) / 300000;
            if (rate < 0) rate = 0;
        }
        rate = Math.round(rate * 100) / 100;

        rateEl.textContent = rate.toFixed(2);
        rateEl.className = 'rate-value';
        display.classList.add('has-result');

        // ランク判定
        const { label, cls } = arcRank(s);
        rankEl.innerHTML = `<span class="rank-badge ${cls}">${label}</span>`;
    }

    function arcRank(s) {
        if (s >= 10000000) return { label: 'PM', cls: 'rank-EX' };
        if (s >= 9900000)  return { label: 'EX+', cls: 'rank-EX' };
        if (s >= 9800000)  return { label: 'EX', cls: 'rank-S' };
        if (s >= 9500000)  return { label: 'AA', cls: 'rank-A' };
        if (s >= 9200000)  return { label: 'A', cls: 'rank-A' };
        if (s >= 8900000)  return { label: 'B', cls: 'rank-B' };
        if (s >= 8600000)  return { label: 'C', cls: 'rank-B' };
        return { label: 'D', cls: 'rank-C' };
    }

    // --- Phigros ---
    function calcPhigros() {
        const c = parseFloat(document.getElementById('phi-constant').value);
        const a = parseFloat(document.getElementById('phi-achieve').value);
        const display = document.getElementById('phi-display');
        const rateEl = document.getElementById('phi-rate');
        const rankEl = document.getElementById('phi-rank');

        if (isNaN(c) || isNaN(a)) {
            rateEl.textContent = '--.-—';
            rateEl.className = 'rate-value empty';
            rankEl.innerHTML = '';
            display.classList.remove('has-result');
            return;
        }

        if (a > 100.0) {
            showToast('⚠️ 達成率が100%を超えています', true);
            return;
        }

        let rate;
        if (a < 70) {
            rate = 0;
        } else {
            rate = c * Math.pow((a - 55) / 45, 2);
        }
        rate = Math.round(rate * 100) / 100;

        rateEl.textContent = rate.toFixed(2);
        rateEl.className = 'rate-value';
        display.classList.add('has-result');

        const { label, cls } = phiRank(a);
        rankEl.innerHTML = `<span class="rank-badge ${cls}">${label}</span>`;
    }

    function phiRank(a) {
        if (a >= 100)  return { label: 'φ', cls: 'rank-EX' };
        if (a >= 95)   return { label: 'V', cls: 'rank-EX' };
        if (a >= 90)   return { label: 'S', cls: 'rank-S' };
        if (a >= 80)   return { label: 'A', cls: 'rank-A' };
        if (a >= 70)   return { label: 'B', cls: 'rank-B' };
        if (a >= 60)   return { label: 'C', cls: 'rank-B' };
        return { label: 'F', cls: 'rank-C' };
    }

    // --- TAKUMI3 ---
    function calcTakumi3() {
        const c = parseFloat(document.getElementById('tak-constant').value);
        const s = parseInt(document.getElementById('tak-score').value);
        const display = document.getElementById('tak-display');
        const rateEl = document.getElementById('tak-rate');
        const rankEl = document.getElementById('tak-rank');

        if (isNaN(c) || isNaN(s)) {
            rateEl.textContent = '--.---';
            rateEl.className = 'rate-value empty';
            rankEl.innerHTML = '';
            display.classList.remove('has-result');
            return;
        }

        if (s > 1000000) {
            showToast('⚠️ スコアが理論値(1,000,000)を超えています', true);
            return;
        }

        let rate = 0;
        if (s <= 800000) {
            rate = 0;
        } else if (s < 970000) {
            const correction = (s - 800000) / 170000;
            rate = (c * correction) / 34;
        } else if (s < 990000) {
            const correction = (s - 970000) / 20000;
            rate = (c + correction) / 34;
        } else if (s < 995000) {
            const correction = 1 + (s - 990000) / 10000;
            rate = (c + correction) / 34;
        } else if (s < 999000) {
            const correction = 1.5 + (s - 995000) / 8000;
            rate = (c + correction) / 34;
        } else {
            const correction = 2 + (s - 999000) / 10000;
            rate = (c + correction) / 34;
        }
        rate = Math.round(rate * 1000) / 1000;

        rateEl.textContent = rate.toFixed(3);
        rateEl.className = 'rate-value';
        display.classList.add('has-result');

        const { label, cls } = takumiRank(s);
        rankEl.innerHTML = `<span class="rank-badge ${cls}">${label}</span>`;
    }

    function takumiRank(s) {
        if (s >= 1000000) return { label: '理論値', cls: 'rank-EX' };
        if (s >= 999000)  return { label: 'S+', cls: 'rank-EX' };
        if (s >= 995000)  return { label: 'S+', cls: 'rank-S' };
        if (s >= 990000)  return { label: 'S', cls: 'rank-S' };
        if (s >= 970000)  return { label: 'AAA', cls: 'rank-A' };
        if (s >= 800000)  return { label: 'BB+', cls: 'rank-B' };
        return { label: 'BB-', cls: 'rank-C' };
    }

    // =============================================
    //  ベスト枠管理
    // =============================================
    const BEST_LIMITS = { arcaea: 30, phigros: 19, takumi3: 30 };

    function getBestKey(game) {
        return 'fig_best_' + game;
    }

    function loadBest(game) {
        try {
            return JSON.parse(localStorage.getItem(getBestKey(game))) || [];
        } catch { return []; }
    }

    function saveBest(game, list) {
        localStorage.setItem(getBestKey(game), JSON.stringify(list));
    }

    function getCurrentRate(game) {
        if (game === 'arcaea') {
            const v = document.getElementById('arc-rate').textContent;
            return v === '--.-—' ? null : parseFloat(v);
        }
        if (game === 'phigros') {
            const v = document.getElementById('phi-rate').textContent;
            return v === '--.-—' ? null : parseFloat(v);
        }
        if (game === 'takumi3') {
            const v = document.getElementById('tak-rate').textContent;
            return v === '--.---' ? null : parseFloat(v);
        }
        return null;
    }

    function getCurrentConstant(game) {
        if (game === 'arcaea') return parseFloat(document.getElementById('arc-constant').value) || null;
        if (game === 'phigros') return parseFloat(document.getElementById('phi-constant').value) || null;
        if (game === 'takumi3') return parseFloat(document.getElementById('tak-constant').value) || null;
        return null;
    }

    function addToBest(game) {
        const rate = getCurrentRate(game);
        if (rate === null) {
            showToast('⚠️ 先にスコアを計算してください', true);
            return;
        }

        const nameInputId = game === 'arcaea' ? 'arc-song-name'
                          : game === 'phigros' ? 'phi-song-name'
                          : 'tak-song-name';
        const name = document.getElementById(nameInputId).value.trim() || '無題の曲';
        const constant = getCurrentConstant(game);

        let list = loadBest(game);

        // 同じ曲名なら上書き
        const existing = list.findIndex(e => e.name === name);
        if (existing !== -1) {
            if (list[existing].rate >= rate) {
                showToast(`「${name}」は既により高いレートで登録済みです`);
                return;
            }
            list.splice(existing, 1);
        }

        list.push({ name, rate, constant });
        list.sort((a, b) => b.rate - a.rate);

        // ベスト枠の上限で切り捨て
        if (list.length > BEST_LIMITS[game]) {
            list = list.slice(0, BEST_LIMITS[game]);
        }

        saveBest(game, list);
        renderBest(game);

        document.getElementById(nameInputId).value = '';
        showToast(`✅ 「${name}」を追加しました`);
    }

    function removeBestItem(game, index) {
        let list = loadBest(game);
        list.splice(index, 1);
        saveBest(game, list);
        renderBest(game);
    }

    function clearBest(game) {
        if (!confirm('ベスト枠をすべてクリアしますか？')) return;
        saveBest(game, []);
        renderBest(game);
        // キャンバス非表示
        document.getElementById('imagePreviewSection-' + game).style.display = 'none';
    }

    function renderBest(game) {
        const list = loadBest(game);
        const listEl = document.getElementById(
            game === 'arcaea' ? 'arc-best-list'
          : game === 'phigros' ? 'phi-best-list'
          : 'tak-best-list'
        );
        const avgEl = document.getElementById(
            game === 'arcaea' ? 'arc-avg'
          : game === 'phigros' ? 'phi-avg'
          : 'tak-avg'
        );
        const limit = BEST_LIMITS[game];
        const decimals = game === 'takumi3' ? 3 : 2;

        if (list.length === 0) {
            listEl.innerHTML = '<div class="empty-best">曲を追加するとここに表示されます</div>';
            avgEl.textContent = game === 'takumi3' ? '--.---' : '--.-—';
            return;
        }

        // 平均計算（ベスト枠の上限に満たない場合も上限分で割る）
        const topList = list.slice(0, limit);
        const sum = topList.reduce((acc, e) => acc + e.rate, 0);
        const avg = sum / limit;
        avgEl.textContent = avg.toFixed(decimals);

        listEl.innerHTML = topList.map((e, i) => `
            <div class="best-item">
                <span class="best-rank ${i < 3 ? 'top3' : ''}">#${i + 1}</span>
                <span class="best-song-name" title="${e.name}">${e.name}</span>
                ${e.constant != null ? `<span class="best-constant">定数 ${e.constant}</span>` : ''}
                <span class="best-rate">${e.rate.toFixed(decimals)}</span>
                <button class="best-delete" onclick="removeBestItem('${game}', ${i})" title="削除">✕</button>
            </div>
        `).join('');
    }

    // =============================================
    //  画像生成（Canvas API）
    // =============================================
    const GAME_THEMES = {
        arcaea: {
            bg: ['#1a0533', '#2d0a5e'],
            accent: '#a855f7',
            accent2: '#7c3aed',
            title: 'Arcaea · Best 30',
            textColor: '#f3e8ff',
            subColor: '#c4b5fd',
            cardBg: 'rgba(255,255,255,0.06)',
            cardBorder: 'rgba(168,85,247,0.3)',
        },
        phigros: {
            bg: ['#0a0a14', '#141428'],
            accent: '#e2e8f0',
            accent2: '#94a3b8',
            title: 'Phigros · Best 19',
            textColor: '#f8fafc',
            subColor: '#cbd5e1',
            cardBg: 'rgba(255,255,255,0.06)',
            cardBorder: 'rgba(226,232,240,0.2)',
        },
        takumi3: {
            bg: ['#0d0d1a', '#1a0d33'],
            accent: '#818cf8',
            accent2: '#6366f1',
            title: 'TAKUMI³ · Best',
            textColor: '#eef2ff',
            subColor: '#a5b4fc',
            cardBg: 'rgba(255,255,255,0.06)',
            cardBorder: 'rgba(129,140,248,0.3)',
        }
    };

    function generateImage(game) {
        const list = loadBest(game);
        if (list.length === 0) {
            showToast('⚠️ ベスト枠にデータがありません', true);
            return;
        }

        const theme = GAME_THEMES[game];
        const limit = Math.min(list.length, BEST_LIMITS[game]);
        const topList = list.slice(0, limit);
        const decimals = game === 'takumi3' ? 3 : 2;

        const cols = 3;
        const rows = Math.ceil(limit / cols);
        const cardW = 300;
        const cardH = 64;
        const padX = 24;
        const padY = 24;
        const gapX = 12;
        const gapY = 8;
        const headerH = 90;

        const canvasW = cols * cardW + (cols - 1) * gapX + padX * 2;
        const canvasH = headerH + rows * cardH + (rows - 1) * gapY + padY * 2;

        const canvas = document.getElementById('canvas-' + game);
        canvas.width = canvasW;
        canvas.height = canvasH;
        const ctx = canvas.getContext('2d');

        // 背景グラデーション
        const bg = ctx.createLinearGradient(0, 0, canvasW, canvasH);
        bg.addColorStop(0, theme.bg[0]);
        bg.addColorStop(1, theme.bg[1]);
        ctx.fillStyle = bg;
        ctx.roundRect(0, 0, canvasW, canvasH, 16);
        ctx.fill();

        // ヘッダー
        ctx.font = 'bold 26px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
        ctx.fillStyle = theme.textColor;
        ctx.fillText(theme.title, padX, padY + 30);

        // 平均レート
        const avgSum = topList.reduce((a, b) => a + b.rate, 0);
        const avg = avgSum / BEST_LIMITS[game];
        ctx.font = '14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
        ctx.fillStyle = theme.subColor;
        ctx.fillText(`平均レート: ${avg.toFixed(decimals)}  (${topList.length}/${BEST_LIMITS[game]}曲)`, padX, padY + 56);

        // アクセントライン
        ctx.fillStyle = theme.accent;
        ctx.fillRect(padX, padY + 68, 200, 2);

        // カード描画
        topList.forEach((entry, i) => {
            const col = i % cols;
            const row = Math.floor(i / cols);
            const x = padX + col * (cardW + gapX);
            const y = headerH + row * (cardH + gapY);

            // カード背景
            ctx.fillStyle = theme.cardBg;
            ctx.beginPath();
            ctx.roundRect(x, y, cardW, cardH, 8);
            ctx.fill();

            // カード枠
            ctx.strokeStyle = theme.cardBorder;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.roundRect(x, y, cardW, cardH, 8);
            ctx.stroke();

            // ランク番号
            const rankColor = i < 3 ? theme.accent : theme.subColor;
            ctx.font = `bold 11px "SF Mono", Monaco, monospace`;
            ctx.fillStyle = rankColor;
            ctx.fillText(`#${String(i + 1).padStart(2, '0')}`, x + 10, y + 22);

            // 曲名
            ctx.font = `600 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;
            ctx.fillStyle = theme.textColor;
            const maxNameW = cardW - 110;
            let songName = entry.name;
            while (ctx.measureText(songName).width > maxNameW && songName.length > 0) {
                songName = songName.slice(0, -1);
            }
            if (songName !== entry.name) songName += '…';
            ctx.fillText(songName, x + 10, y + 40);

            // 譜面定数
            if (entry.constant != null) {
                ctx.font = `11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;
                ctx.fillStyle = theme.subColor;
                ctx.fillText(`定数 ${entry.constant}`, x + 10, y + 56);
            }

            // レート（右寄せ）
            const rateStr = entry.rate.toFixed(decimals);
            ctx.font = `bold 20px "SF Mono", Monaco, monospace`;
            ctx.fillStyle = theme.accent;
            const rateW = ctx.measureText(rateStr).width;
            ctx.fillText(rateStr, x + cardW - rateW - 12, y + 40);
        });

        // フッター
        ctx.font = '11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
        ctx.fillStyle = theme.subColor;
        ctx.globalAlpha = 0.5;
        ctx.fillText('Generated by Fig\'s ToolBox', padX, canvasH - 8);
        ctx.globalAlpha = 1;

        // 表示
        const section = document.getElementById('imagePreviewSection-' + game);
        section.style.display = 'block';
        section.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

        showToast('✅ 画像を生成しました');
    }

    function downloadImage(game) {
        const canvas = document.getElementById('canvas-' + game);
        const link = document.createElement('a');
        link.download = `best_${game}_${new Date().toISOString().slice(0, 10)}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
    }

    // =============================================
    //  トースト
    // =============================================
    function showToast(msg, isError = false) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.background = isError ? '#ef4444' : 'var(--accent)';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // =============================================
    //  初期化
    // =============================================
    window.addEventListener('DOMContentLoaded', () => {
        renderBest('arcaea');
        renderBest('phigros');
        renderBest('takumi3');
    });
    </script>
</body>
</html>
