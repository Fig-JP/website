<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ダイスローラー | Fig's ToolBox</title>
    <link rel="stylesheet" href="css/common.css">
    <style>
        /* dice.html 専用スタイル */
        main {
            padding: 100px 20px 40px;
        }

        .container {
            max-width: 500px;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header-row h1 {
            font-size: 1.5rem;
            color: var(--accent);
            margin: 0;
            text-align: left;
        }

        .mode-switch {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 34px;
            height: 18px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--toggle-off);
            transition: .4s;
            border-radius: 20px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 12px;
            width: 12px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background: var(--toggle-on);
        }

        input:checked + .slider:before {
            transform: translateX(16px);
        }

        .stats-box {
            display: none;
            background: var(--settings-bg);
            border: 1px dashed var(--accent);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            text-align: center;
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .stat-value {
            font-size: 1rem;
            font-weight: bold;
            color: var(--accent);
        }

        .input-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: var(--settings-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--card-border);
        }

        .num-input {
            width: 70px;
            background: var(--card-bg);
            border: 2px solid var(--card-border);
            border-radius: 8px;
            padding: 10px;
            color: var(--accent);
            font-size: 1.5rem;
            text-align: center;
            font-weight: bold;
        }

        .num-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .d-label {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--text-muted);
        }

        .roll-btn {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 25px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .roll-btn:hover {
            opacity: 0.85;
            transform: translateY(-2px);
        }

        .result-card {
            background: var(--settings-bg);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            border: 2px solid var(--card-border);
        }

        .result-total {
            font-size: 4rem;
            font-weight: bold;
            color: var(--accent);
            margin: 5px 0;
            line-height: 1;
        }

        .result-sub {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .dice-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            margin-top: 15px;
            max-height: 120px;
            overflow-y: auto;
            padding: 5px;
        }

        .die-chip {
            background: var(--card-bg);
            color: var(--accent);
            border: 1px solid var(--card-border);
            border-radius: 4px;
            min-width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .presets {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .p-btn {
            background: var(--btn-secondary-bg);
            color: var(--btn-secondary-color);
            border: none;
            border-radius: 6px;
            padding: 8px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .p-btn:hover {
            background: var(--btn-secondary-hover);
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
        }

        .reset-btn {
            background: none;
            border: 1px solid var(--card-border);
            color: var(--text-muted);
            border-radius: 4px;
            padding: 2px 8px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.2s;
        }

        .reset-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
            color: var(--text-primary);
        }

        @media (max-width: 768px) {
            .result-total {
                font-size: 3rem;
            }

            .presets {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        input[type=number]::-webkit-inner-spin-button {
            -webkit-appearance: none;
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">🛠️ Fig's ToolBox</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <div class="container">
            <div class="header-row">
                <h1>🎲 Dice Roller</h1>
                <div class="mode-switch">
                    <span>CoCモード</span>
                    <label class="switch">
                        <input type="checkbox" id="cocToggle" onchange="toggleMode()">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div id="statsBox" class="stats-box">
                <div class="stats-grid">
                    <div>
                        <span class="stat-label">直近10回平均</span><br>
                        <span id="rollingAvg" class="stat-value">--.-</span>
                    </div>
                    <div>
                        <span class="stat-label">最高出目</span><br>
                        <span id="rollingMax" class="stat-value">--</span>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <input type="number" id="diceCount" class="num-input" value="1" min="1" max="100">
                <span class="d-label">D</span>
                <input type="number" id="diceFaces" class="num-input" value="100" min="2" max="1000">
                <button class="roll-btn" onclick="roll()">振る</button>
            </div>

            <div class="presets">
                <button class="p-btn" onclick="setDice(1, 100)">1D100</button>
                <button class="p-btn" onclick="setDice(3, 6)">3D6</button>
                <button class="p-btn" onclick="setDice(1, 10)">1D10</button>
                <button class="p-btn" onclick="setDice(1, 6)">1D6</button>
                <button class="p-btn" onclick="setDice(1, 20)">1D20</button>
                <button class="p-btn" onclick="setDice(2, 6)">2D6</button>
                <button class="p-btn" onclick="setDice(1, 4)">1D4</button>
                <button class="p-btn" onclick="setDice(1, 8)">1D8</button>
            </div>

            <div class="result-card" id="resultCard">
                <div style="color:var(--text-muted); padding-top:30px;">ダイスを振ってください</div>
            </div>

            <div class="history-header">
                <span>📜 履歴 (直近10件)</span>
                <button class="reset-btn" onclick="resetHistory()">履歴リセット</button>
            </div>
            <div id="historyList"></div>
        </div>
    </main>

    <footer>
        <p>Created by Fig | <a href="about.html">About Me</a></p>
    </footer>

    <script>
        let historyTotals = [];
        let isCocMode = false;

        window.onload = () => {
            const saved = localStorage.getItem('coc_mode_enabled') === 'true';
            document.getElementById('cocToggle').checked = saved;
            toggleMode();
        };

        function toggleMode() {
            isCocMode = document.getElementById('cocToggle').checked;
            localStorage.setItem('coc_mode_enabled', isCocMode);
            document.getElementById('statsBox').style.display = isCocMode ? 'block' : 'none';
            updateStats();
        }

        function setDice(n, m) {
            document.getElementById('diceCount').value = n;
            document.getElementById('diceFaces').value = m;
            roll();
        }

        function roll() {
            const n = parseInt(document.getElementById('diceCount').value) || 1;
            const m = parseInt(document.getElementById('diceFaces').value) || 100;

            let results = [];
            let total = 0;
            for (let i = 0; i < n; i++) {
                const r = Math.floor(Math.random() * m) + 1;
                results.push(r);
                total += r;
            }

            const currentAvg = (total / n).toFixed(1).replace(/\.0$/, '');
            historyTotals.unshift(total);
            if (historyTotals.length > 10) historyTotals.pop();

            updateStats();
            displayResult(n, m, total, currentAvg, results);
            updateHistoryUI(n, m, total);
        }

        function updateStats() {
            if (!isCocMode || historyTotals.length === 0) {
                document.getElementById('rollingAvg').textContent = "--.-";
                document.getElementById('rollingMax').textContent = "--";
                return;
            }
            const avg = (historyTotals.reduce((a, b) => a + b, 0) / historyTotals.length).toFixed(1);
            const max = Math.max(...historyTotals);
            document.getElementById('rollingAvg').textContent = avg;
            document.getElementById('rollingMax').textContent = max;
        }

        function displayResult(n, m, total, avg, results) {
            const card = document.getElementById('resultCard');
            const diceChips = results.map(r => `<div class="die-chip">${r}</div>`).join('');
            
            card.innerHTML = `
                <div class="result-total">${total}</div>
                <div class="result-sub">${n}D${m} | 平均: ${avg}</div>
                ${n > 1 ? `<div class="dice-container">${diceChips}</div>` : ''}
            `;
        }

        function updateHistoryUI(n, m, total) {
            const list = document.getElementById('historyList');
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerHTML = `<span>${n}D${m}</span><span>${total}</span>`;
            list.insertBefore(item, list.firstChild);

            const items = list.querySelectorAll('.history-item');
            if (items.length > 10) {
                list.removeChild(items[items.length - 1]);
            }
        }

        function resetHistory() {
            historyTotals = [];
            document.getElementById('historyList').innerHTML = '';
            updateStats();
        }
    </script>
</body>
</html>
